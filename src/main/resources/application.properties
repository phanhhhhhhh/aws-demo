spring.application.name=aws-demo

# ── Database (overridden by env vars on AWS) ──────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/awsdemo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Server ───────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890change_this_in_prod}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Actuator (health check for ECS) ──────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
